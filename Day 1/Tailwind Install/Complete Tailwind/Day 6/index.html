<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razor Pay</title>

    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="../output.css">

    <!-- Google Font (Mulish) -->
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="bg-deepBlue">
        <div class="relative w-[1080px] mx-auto flex items-center justify-between">

            <!-- Logo -->
            <a href="index.html" class="cursor-pointer py-7 pr-7">
                <img src="../Images/logo.svg" alt="razorpay logo" width="125" height="30">
            </a>

            <!-- Nav Links -->
            <ul class="flex space-x-6">

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Payments</a>
                    <div class="absolute bottom-0 hidden w-full h-1 bg-lightBlue group-hover:block"></div>
                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Banking</a>
                    <div class="absolute bottom-0 hidden w-full h-1 bg-lightBlue group-hover:block"></div>
                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200">
                    <a href="#">Corporate Card</a>
                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200">
                    <a href="#">Payroll</a>
                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Resources</a>
                    <div class="absolute bottom-0 hidden w-full h-1 bg-lightBlue group-hover:block"></div>
                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Support</a>
                    <div class="absolute bottom-0 hidden w-full h-1 bg-lightBlue group-hover:block"></div>
                </li>

                <li class="text-white font-mullish py-7 hover:text-lightBlue cursor-pointer transition-all duration-200 relative group">
                    <a href="#">Pricing</a>
                    <div class="absolute bottom-0 hidden w-full h-1 bg-lightBlue group-hover:block"></div>
                </li>

            </ul>

            <!-- Right Section -->
            <div class="flex items-center space-x-6">

                <img src="../Images/india-flag.svg" alt="flag" width="20" height="20">

                <button class="py-3 px-5 font-mullish text-white border-lightBlue border-2 rounded-sm text-sm font-bold">
                    Log in
                </button>
                <button class="py-3 px-4 font-mullish rounded-sm text-sm font-bold bg-white text-lightBlue300 border transition-all duration-200 hover:text-lightBlue500">
                    Sign Up
                </button>

            </div>

        </div>
    </nav>

    <div class="relative bg-deepBlue">
        <div class="w-10/12 flex flex-row justify-between items-center mx-auto ">
        
        <!-- Left Part -->
         <div class="flex flex-col gap-4">
            <h1 class="font-mullish font-bold text-[40px] leading-[1.2] text-white">
                Power your finance, grow your business
            </h1>

            <div class="w-6 h-1 bg-greenLight"></div>

            <p class="font-mullish text-[18px] leading-7 text-white opacity-70">
                Accept payments from customers. Automate
                payouts to vendors & employees. Never run out
                of working capital.
            </p>

            <button class="bg-lightBlue text-white rounded-md font-mullish font-bold hover:bg-lightBlue500 transition-all duration-200 py-[14px] px-[11px]">Sign Up Now</button>
         </div>

         <!-- Right Part -->
            <img src="../Images/hero-illustration.jpg" alt="Hero Illustration">
          
        </div>

        <!-- Shape part -->
        <img src="../Images/hero-shape.svg" alt="Hero Shape">

    </div>

</body>
</html>
